# Serves the built React SPA and proxies API/WS to the Hummingbot API over the
# internal docker network, injecting Basic auth so credentials never reach the
# browser (same model as the Vite dev proxy).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Basic auth for admin:admin (base64). Keep in sync with the API creds.
    # (Set via build; this is the internal service auth, never sent to the client.)
    set $hb_auth "Basic YWRtaW46YWRtaW4=";

    # SPA routing — every non-asset path falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST: /api/portfolio/state -> http://hummingbot-api:8000/portfolio/state
    location /api/ {
        proxy_pass http://hummingbot-api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $hb_auth;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 600s;
    }

    # WebSocket: /ws/market-data -> http://hummingbot-api:8000/ws/market-data
    location /ws/ {
        proxy_pass http://hummingbot-api:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Authorization $hb_auth;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
