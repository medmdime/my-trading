# Thin orchestration for MY trading stack.
# The engine (hummingbot-api) runs from a PUBLISHED IMAGE + my code baked in
# via api.Dockerfile. The UI (react-dashboard) is my own app, built from source.
# The ONLY code I maintain lives in:
#   - ./bots/controllers/...   (my strategies)
#   - ./bots/conf/controllers/ (my configs)
#   - ./react-dashboard/       (my UI, replaces the stock Streamlit dashboard)
services:
  hummingbot-api:
    container_name: hummingbot-api
    # upstream engine + MY bot code/configs baked in via api.Dockerfile
    # (base image pinned to a digest in that Dockerfile for reproducibility).
    build:
      context: .
      dockerfile: api.Dockerfile
    ports:
      # host 8000 is taken by Coolify on the server — publish the API on 8002 instead
      - "8002:8000"
    volumes:
      # Full bots dir is bind-mounted (persists runtime state + secrets). On
      # Coolify it starts empty, so api.Dockerfile's entrypoint seeds the
      # git-managed code/configs (controllers, scripts, conf) into it on startup
      # — that's what makes `git push` deploy everything and lets the bot
      # containers (which mount controllers/scripts from the host) find them.
      - ./bots:/hummingbot-api/bots
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc:ro
      - /etc/hostname:/host/disk-probe:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      - BROKER_HOST=emqx
      - DATABASE_URL=postgresql+asyncpg://hbot:hummingbot-api@postgres:5432/hummingbot_api
      - GATEWAY_URL=http://host.docker.internal:15888
      - HOST_PROC=/host/proc
      - HOST_DISK_PATH=/host/disk-probe
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - emqx-bridge
    # On Coolify this container also joins the shared "coolify" proxy network.
    # Without pinning which network Traefik should route through, it picks a
    # backend IP non-deterministically on each (re)creation — if it picks the
    # emqx-bridge IP (which coolify-proxy isn't on), every proxied request
    # hangs until Traefik's own dial timeout fires (504, or nothing at all).
    # Harmless on plain `docker compose` (no such network/label there).
    labels:
      - "traefik.docker.network=coolify"
    depends_on:
      - postgres

  react-dashboard:
    container_name: react-dashboard
    # NEW React UI (replaces Streamlit at stylette.info). nginx serves the static
    # build and proxies /api + /ws to hummingbot-api over the internal network,
    # injecting Basic auth (see react-dashboard/nginx.conf).
    build:
      context: ./react-dashboard
      dockerfile: Dockerfile
    ports:
      - "8090:80"
    networks:
      - emqx-bridge
    # See the same label on hummingbot-api above — same Traefik multi-network gotcha.
    labels:
      - "traefik.docker.network=coolify"
    depends_on:
      - hummingbot-api

  emqx:
    container_name: hummingbot-broker
    image: emqx:5@sha256:c944155b31330c235c6547a3c8b791464e243d4c1ffbdc487a7ea07e94b884f4
    restart: unless-stopped
    environment:
      - EMQX_NAME=emqx
      - EMQX_HOST=node1.emqx.local
      - EMQX_CLUSTER__DISCOVERY_STRATEGY=static
      - EMQX_CLUSTER__STATIC__SEEDS=[emqx@node1.emqx.local]
      - EMQX_LOADED_PLUGINS="emqx_recon,emqx_retainer,emqx_management,emqx_dashboard"
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
      - emqx-etc:/opt/emqx/etc
    ports:
      - "1883:1883"
      - "8883:8883"
      - "8083:8083"
      - "8084:8084"
      - "8081:8081"
      - "18083:18083"
      # - "61613:61613"  # web-stomp gateway (unused; 61613 is in a Windows reserved port range)
    networks:
      emqx-bridge:
        aliases:
          - node1.emqx.local
    labels:
      - "traefik.docker.network=coolify"
    healthcheck:
      test: [ "CMD", "/opt/emqx/bin/emqx_ctl", "status" ]
      interval: 5s
      timeout: 25s
      retries: 5

  postgres:
    container_name: hummingbot-postgres
    image: postgres:16@sha256:081f1bc7bd5e143dbb6e487b710bbc27712cdcfaced4c071b8e47349aa1b4171
    restart: unless-stopped
    environment:
      - POSTGRES_DB=hummingbot_api
      - POSTGRES_USER=hbot
      - POSTGRES_PASSWORD=hummingbot-api
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    networks:
      - emqx-bridge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hbot -d hummingbot_api"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  emqx-bridge:
    driver: bridge

volumes:
  emqx-data: { }
  emqx-log: { }
  emqx-etc: { }
  postgres-data: { }
